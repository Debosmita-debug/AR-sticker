<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AR Scanner</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="container">
    <h1>Scanner</h1>
    <div id="notice" class="card small">Point camera at a printed sticker. Allow camera permission.</div>
    <div id="cameraArea" class="card" style="min-height:320px;display:flex;align-items:center;justify-content:center">
      <div id="loading">Initializing AR engine…</div>
    </div>
    <div id="passwordOverlay" class="card" style="display:none;margin-top:12px">
      <label>Enter password to view sticker <input id="pw" type="password"/></label>
      <button id="pwBtn" class="btn">Submit</button>
    </div>
  </main>
  <script type="module" src="./scanner.js"></script>
</body>
</html>
